version: "3.9"

services:
  api:
    build: .
    container_name: ai-content-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  worker:
    build: .
    container_name: ai-content-worker
    # Consumes both content_queue and email_queue — no new containers needed
    command: [
      "uv", "run", "celery", "-A", "app.workers.celery_app", "worker",
      "--loglevel=info",
      "--queues=content_queue,email_queue"
    ]
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  beat:
    build: .
    container_name: ai-content-beat
    command: ["uv", "run", "celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  streamlit:
    build: ./streamlit_app
    container_name: ai-content-streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ai-content-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_content_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-content-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ai-content-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

volumes:
  postgres_data: